<!-- ============================================================ -->
<!-- nav.html - NAVIGATION BAR                                    -->
<!-- This is included in the default layout so it appears on     -->
<!-- every page. The 'active' class highlights the current page. -->
<!-- ============================================================ -->

<nav class="site-nav">
  <!-- Each link checks if it's the current page to highlight it -->
  <!-- '/' is the homepage -->
  <a href="{{ '/' | relative_url }}"
     class="nav-tab {% if page.url == '/' %}active{% endif %}">HOME</a>

  <!-- '/articles/' is the articles listing page -->
  <a href="{{ '/articles/' | relative_url }}"
     class="nav-tab {% if page.url contains '/articles/' %}active{% endif %}">ARTICLES</a>

  <!-- '/resources/' is the free resources page -->
  <a href="{{ '/resources/' | relative_url }}"
     class="nav-tab {% if page.url == '/resources/' %}active{% endif %}">FREE RESOURCES</a>

  <!-- '/videos/' is the YouTube videos page -->
  <a href="{{ '/videos/' | relative_url }}"
     class="nav-tab {% if page.url == '/videos/' %}active{% endif %}">VIDEOS</a>
</nav>
